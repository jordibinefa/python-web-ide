<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDE Python</title>
<style>
  :root {
    --bg:     #f4f5f7;
    --panel:  #ffffff;
    --line:   #dde1e7;
    --text:   #1c2028;
    --muted:  #6b7585;
    --accent: #1a7f52;
    --warn:   #b45a06;
    --err:    #c0342e;
  }
  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    margin: 0;
  }
  body {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, sans-serif;
  }

  /* ── Capçalera ── */
  header {
    flex-shrink: 0;
    padding: 12px 20px 8px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 1.05rem; font-weight: 600; }
  .projecte-wrap {
    font-size: .82rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .nom-projecte {
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 1px;
    transition: color .15s, border-color .15s;
  }
  .nom-projecte:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .nom-projecte-input {
    font-size: .82rem;
    font-weight: 600;
    font-family: inherit;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 1px 6px;
    outline: none;
    color: var(--text);
    background: white;
    min-width: 80px;
  }
  header p { margin: 3px 0 0; color: var(--muted); font-size: .8rem; }

  /* ── Barra d'estat ── */
  .status-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px;
    font-size: .8rem;
    color: var(--muted);
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--warn);
    flex-shrink: 0;
    transition: background .2s;
  }
  .dot.ready { background: var(--accent); animation: none; }
  .dot.busy  { background: var(--warn);   animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .saved-indicator { font-size: .75rem; color: var(--accent); opacity: 0; transition: opacity .4s; }
  .saved-indicator.visible { opacity: 1; }
  .pulse-counter {
    margin-left: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .78rem;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2px 8px;
  }

  /* ── Disposició principal ── */
  main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
  }
  .col {
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-body {
    flex-shrink: 0;
    padding: 10px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Barra de pestanyes ── */
  .tab-bar {
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    border-bottom: 2px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 6px;
    min-height: 36px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: .8rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }
  .tab-close {
    background: none; border: none; padding: 1px 3px; margin: 0;
    cursor: pointer; color: var(--muted); font-size: .85rem; line-height: 1;
    border-radius: 3px; opacity: 0; transition: opacity .15s;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--line); color: var(--err); }
  .tab-new {
    display: flex; align-items: center; padding: 4px 8px;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 1.1rem; border-radius: 4px; margin: 4px 2px; line-height: 1;
  }
  .tab-new:hover { background: var(--bg); color: var(--text); }
  .tab-rename-input {
    width: 90px; font-size: .8rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    border: 1px solid var(--accent); border-radius: 3px;
    padding: 1px 4px; background: white; color: var(--text); outline: none;
  }

  /* ── Editor CodeMirror ── */
  #codeEditor {
    flex: 1; min-height: 0; overflow: hidden;
    display: flex; flex-direction: column;
  }
  #codeEditor .cm-editor {
    flex: 1; min-height: 0;
    border-top: none; border-left: none; border-right: none;
    border-bottom: 1px solid var(--line); border-radius: 0; font-size: .88rem;
  }
  #codeEditor .cm-editor.cm-focused { outline: none; border-bottom-color: var(--accent); }
  #codeEditor .cm-scroller {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow: auto;
  }

  /* ── Botons ── */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--accent); color: #fff; border: none;
    border-radius: 7px; padding: 8px 16px; font-weight: 600;
    font-size: .85rem; cursor: pointer;
  }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text);
    border: 1px solid var(--line); font-weight: 500;
  }
  button.secondary:hover:not(:disabled) { background: var(--bg); }
  button.danger {
    background: transparent; color: var(--err);
    border: 1px solid var(--err); font-weight: 600;
  }
  button.danger:hover:not(:disabled) { background: #fdf2f2; }
  button.sm { padding: 4px 10px; font-size: .76rem; }
  button.esborra {
    background: transparent; color: var(--muted);
    border: 1px solid var(--line); font-weight: 500;
  }
  button.esborra:hover:not(:disabled) {
    color: var(--err); border-color: var(--err); background: #fdf2f2;
  }
  kbd {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .72em; font-weight: 400; opacity: .7;
  }

  /* ── Capçalera de la consola ── */
  .console-header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px 6px; border-bottom: 1px solid var(--line);
  }
  .console-header h2 {
    margin: 0; font-size: .7rem;
    text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
  }
  .console-header .btn-row { gap: 5px; }

  /* ── Consola ── */
  .console {
    flex: 1; min-height: 0; background: #fafafa;
    padding: 10px 12px; overflow: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .82rem; white-space: pre-wrap;
  }
  .console .stdout { color: var(--text); }
  .console .stderr { color: var(--err); }
  .console .status { color: var(--muted); font-style: italic; }

  /* ── Input interactiu dins la consola (input() de Python) ── */
  .stdin-line { display: flex; align-items: baseline; }
  .stdin-prompt { white-space: pre; color: var(--text); }
  .stdin-input {
    border: none; outline: none; background: transparent;
    color: var(--accent);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: inherit; min-width: 4ch; flex: 1;
    padding: 0; caret-color: var(--accent);
  }
  .stdin-input:disabled { color: var(--text); }

  /* ── Peu de pàgina ── */
  footer {
    flex-shrink: 0; padding: 6px 20px;
    color: var(--muted); font-size: .72rem;
    border-top: 1px solid var(--line); background: var(--panel);
  }
  footer code { color: var(--accent); font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* ── Mòbil ── */
  @media (max-width: 760px) {
    html, body { height: auto; overflow: auto; }
    main { grid-template-columns: 1fr; overflow: visible; height: auto; }
    .col { min-height: 300px; }
    #codeEditor .cm-scroller { min-height: 200px; max-height: 40vh; }
    .console { max-height: 40vh; min-height: 150px; }
  }
</style>
</head>

    <h1>IDE Python</h1>
    <span class="projecte-wrap">

<!-- Codi font del worker: es llegeix com a text i es converteix en Blob URL. -->
<script id="worker-src" type="text/plain">
let pyodideReadyPromise = null;

async function setup(pyodideBase, sharedBuffer) {
  // pyodideBase arriba com a URL absoluta calculada pel fil principal,
  // perque un worker creat des d'un Blob no te ubicacio real per resoldre camins relatius.
  self.importScripts(pyodideBase + 'pyodide.js');
  const pyodide = await loadPyodide({ indexURL: pyodideBase });
  pyodide.setStdout({ batched: (msg) => self.postMessage({ type: 'stdout', text: msg }) });
  pyodide.setStderr({ batched: (msg) => self.postMessage({ type: 'stderr', text: msg }) });

  // Override input() per comunicar-se de forma sincronа amb el fil principal
  // via SharedArrayBuffer + Atomics.wait (bloqueja el worker, no el navegador).
  const ctrlArr = new Int32Array(sharedBuffer, 0, 2); // [0]=estat, [1]=longitud

  pyodide.globals.set('__js_input__', (prompt = '') => {
    const promptStr = String(prompt ?? '');
    Atomics.store(ctrlArr, 0, 0);                       // Reinicia l'estat a "esperant"
    self.postMessage({ type: 'requestInput', prompt: promptStr });
    Atomics.wait(ctrlArr, 0, 0);                        // Bloqueja fins que arribi la resposta
    const len   = ctrlArr[1];
    // .slice() copia els bytes a un ArrayBuffer normal (TextDecoder rebutja vistes SharedArrayBuffer)
    const bytes = new Uint8Array(sharedBuffer, 8, len).slice();
    return new TextDecoder().decode(bytes);
  });

  pyodide.runPython('import builtins; builtins.input = __js_input__');

  // Injecta la funció per enviar imatges (matplotlib) al fil principal
  pyodide.globals.set('__send_image__', (data) => {
    self.postMessage({ type: 'image', data });
  });

  return pyodide;
}

self.onmessage = async (event) => {
  const msg = event.data;

  if (msg.type === 'init') {
    pyodideReadyPromise = setup(msg.pyodideBase, msg.sharedBuffer);
    pyodideReadyPromise.then(() => self.postMessage({ type: 'ready' }));
    return;
  }

  const pyodide = await pyodideReadyPromise;

  if (msg.type === 'run') {
    self.postMessage({ type: 'busy' });
    try {
      // Elimina els .py existents a '/' per garantir coherencia amb el projecte actual
      for (const nom of pyodide.FS.readdir('/')) {
        if (nom.endsWith('.py')) pyodide.FS.unlink('/' + nom);
      }
      // Escriu els fitxers del projecte actual
      for (const f of msg.files) {
        pyodide.FS.writeFile(f.path, f.content);
      }
      // Carrega els paquets de Pyodide que el codi importa (numpy, pandas, etc.)
      self.postMessage({ type: 'status', text: 'Carregant paquets…' });
      await pyodide.loadPackagesFromImports(msg.code);
      // Pateja plt.show() perque enviï la imatge al fil principal en lloc d'obrir una finestra
      await pyodide.runPythonAsync(`
import os, sys
os.environ['MPLBACKEND'] = 'Agg'
try:
    import matplotlib
    matplotlib.use('Agg')
    import matplotlib.pyplot as _plt, io as _io, base64 as _b64
    def _mpl_show(*a, **kw):
        buf = _io.BytesIO()
        for n in _plt.get_fignums():
            _plt.figure(n).savefig(buf, format='png', bbox_inches='tight')
            buf.seek(0)
            __send_image__(_b64.b64encode(buf.read()).decode())
            buf.seek(0)
            buf.truncate()
        _plt.close('all')
    _plt.show = _mpl_show
except (ImportError, ModuleNotFoundError):
    pass
`);
      // Invalida els moduls cachejats per permetre re-importar versions editades
      const mods = JSON.stringify(msg.moduleNames);
      pyodide.runPython(`import sys\nfor m in ${mods}:\n    sys.modules.pop(m, None)`);
      await pyodide.runPythonAsync(msg.code);
    } catch (err) {
      self.postMessage({ type: 'stderr', text: String(err) });
    }
    self.postMessage({ type: 'done' });
  }
};
</script>

<script type="module">
import { EditorView, basicSetup, python } from '/vendor/codemirror/6.0.2/codemirror-bundle.js';
import JSZip from '/vendor/jszip/3.10.1/jszip.js';

(function () {
  // ── Elements de la interfície ─────────────────────────────────────────
  const statusDot      = document.getElementById('statusDot');
  const statusText     = document.getElementById('statusText');
  const savedIndicator = document.getElementById('savedIndicator');
  const pulseCounter   = document.getElementById('pulseCounter');
  const nomProjecteEl  = document.getElementById('nomProjecte');
  const consoleOut     = document.getElementById('consoleOut');
  const runBtn         = document.getElementById('runBtn');
  const interruptBtn   = document.getElementById('interruptBtn');
  const clearBtn       = document.getElementById('clearBtn');
  const copyBtn        = document.getElementById('copyBtn');
  const exportBtn      = document.getElementById('exportBtn');
  const importBtn      = document.getElementById('importBtn');
  const importInput    = document.getElementById('importInput');
  const esborraBtn     = document.getElementById('esborraBtn');
  const tabBar         = document.getElementById('tabBar');

  // ── SharedArrayBuffer per a input() interactiu ────────────────────────
  // Requereix les capçaleres COOP/COEP que envia server.py.
  // Layout: [Int32: estat] [Int32: longitud] [Uint8[]: dades UTF-8]
  const sharedBuf = typeof SharedArrayBuffer !== 'undefined'
    ? new SharedArrayBuffer(8 + 4096)
    : null;
  const ctrlArr = sharedBuf ? new Int32Array(sharedBuf, 0, 2) : null;

  if (!sharedBuf) {
    // Avisa si la pàgina no s'ha servit amb les capçaleres correctes
    const warn = document.createElement('span');
    warn.style.cssText = 'color:var(--warn);font-size:.75rem;';
    warn.textContent = ' · input() no disponible (usa python3 server.py)';
    document.querySelector('.status-row').appendChild(warn);
  }

  // ── Clau localStorage i fitxers per defecte ───────────────────────────
  const CLAU_LS = 'python-ide-project';

  const fitxersPerDefecte = [
    {
      name: 'main.py',
      content:
`import matplotlib.pyplot as plt
import numpy as np

x = np.linspace(0, 2 * np.pi, 300)

fig, axes = plt.subplots(1, 2, figsize=(10, 4))

axes[0].plot(x, np.sin(x), color='steelblue', linewidth=2)
axes[0].set_title('Sinus')
axes[0].set_xlabel('x')
axes[0].grid(True, alpha=0.3)

axes[1].plot(x, np.cos(x), color='tomato', linewidth=2)
axes[1].set_title('Cosinus')
axes[1].set_xlabel('x')
axes[1].grid(True, alpha=0.3)

fig.suptitle('Funcions trigonometriques', fontsize=13)
plt.tight_layout()
plt.show()
`,
    },
    {
      name: 'helper.py',
      content:
`def saluda(nom):
    return f"Hola {nom}, aixo ve d'un fitxer .py importat des d'un altre."
`,
    },
  ];

  // ── Estat del projecte ────────────────────────────────────────────────
  let files       = [];
  let activeIdx   = 0;
  let nomProjecte = 'projecte';

  function actualitzaTitol() {
    document.title = nomProjecte + ' — IDE Python';
  }

  function carregaProjecte() {
    try {
      const raw = localStorage.getItem(CLAU_LS);
      if (raw) {
        const saved = JSON.parse(raw);
        if (Array.isArray(saved.files) && saved.files.length > 0) {
          files       = saved.files;
          activeIdx   = Math.min(saved.activeIdx ?? 0, files.length - 1);
          nomProjecte = saved.nom ?? 'projecte';
          nomProjecteEl.textContent = nomProjecte;
          actualitzaTitol();
          return;
        }
      }
    } catch (_) { /* Dades corrompudes */ }
    files = fitxersPerDefecte.map(f => ({ ...f }));
    activeIdx = 0;
    actualitzaTitol();
  }

  carregaProjecte();

  function desaEstat() {
    files[activeIdx].content = editor.state.doc.toString();
    try {
      localStorage.setItem(CLAU_LS, JSON.stringify({ nom: nomProjecte, files, activeIdx }));
      mostraDesat();
    } catch (_) { }
  }

  let desatTimer = null;
  function mostraDesat() {
    savedIndicator.classList.add('visible');
    clearTimeout(desatTimer);
    desatTimer = setTimeout(() => savedIndicator.classList.remove('visible'), 2000);
  }

  let timerId = null;
  function planificaAutoguardat() {
    clearTimeout(timerId);
    timerId = setTimeout(desaEstat, 1000);
  }

  // ── Editor CodeMirror 6 ───────────────────────────────────────────────
  const editor = new EditorView({
    doc: files[activeIdx].content,
    extensions: [
      basicSetup,
      python(),
      EditorView.updateListener.of((update) => {
        if (update.docChanged) planificaAutoguardat();
      }),
    ],
    parent: document.getElementById('codeEditor'),
  });

  // ── Edició del nom del projecte ───────────────────────────────────────
  nomProjecteEl.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'nom-projecte-input';
    input.value = nomProjecte;
    nomProjecteEl.replaceWith(input);
    input.focus();
    input.select();

    function confirma() {
      nomProjecte = input.value.trim() || nomProjecte;
      nomProjecteEl.textContent = nomProjecte;
      input.replaceWith(nomProjecteEl);
      actualitzaTitol();
      desaEstat();
    }
    input.addEventListener('blur', confirma);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = nomProjecte; input.blur(); }
    });
  });

  // ── Drecera Ctrl+Enter / Cmd+Enter ───────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!runBtn.disabled) runBtn.click();
    }
  });

  // ── Gestió de pestanyes ───────────────────────────────────────────────
  function renderTabs() {
    tabBar.innerHTML = '';
    files.forEach((f, i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === activeIdx ? ' active' : '');

      const nameSpan = document.createElement('span');
      nameSpan.className = 'tab-name';
      nameSpan.textContent = f.name;
      nameSpan.addEventListener('dblclick', () => iniciaReanomenament(i, nameSpan));

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '×';
      closeBtn.title = 'Tanca fitxer';
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); tancaFitxer(i); });

      tab.appendChild(nameSpan);
      tab.appendChild(closeBtn);
      tab.addEventListener('click', () => canviaPestanya(i));
      tabBar.appendChild(tab);
    });

    const newBtn = document.createElement('button');
    newBtn.className = 'tab-new';
    newBtn.textContent = '+';
    newBtn.title = 'Nou fitxer .py';
    newBtn.addEventListener('click', nouFitxer);
    tabBar.appendChild(newBtn);
  }

  function actualitzaClasseActiva() {
    tabBar.querySelectorAll('.tab').forEach((tab, i) => {
      tab.classList.toggle('active', i === activeIdx);
    });
  }

  function canviaPestanya(i) {
    if (i === activeIdx) return;
    files[activeIdx].content = editor.state.doc.toString();
    activeIdx = i;
    editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: files[i].content } });
    actualitzaClasseActiva();
  }

  function nouFitxer() {
    const nom = prompt('Nom del fitxer:', 'nou.py');
    if (!nom) return;
    const nomNet = nom.endsWith('.py') ? nom : nom + '.py';
    files[activeIdx].content = editor.state.doc.toString();
    files.push({ name: nomNet, content: '' });
    activeIdx = files.length - 1;
    editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: '' } });
    renderTabs();
    planificaAutoguardat();
  }

  function tancaFitxer(i) {
    if (files.length === 1) return;
    files[activeIdx].content = editor.state.doc.toString();
    files.splice(i, 1);
    if (activeIdx >= files.length) activeIdx = files.length - 1;
    else if (activeIdx > i) activeIdx--;
    editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: files[activeIdx].content } });
    renderTabs();
    planificaAutoguardat();
  }

  function iniciaReanomenament(i, nameSpan) {
    const input = document.createElement('input');
    input.className = 'tab-rename-input';
    input.value = files[i].name;
    nameSpan.replaceWith(input);
    input.focus();
    input.select();

    function confirma() {
      const nouNom = input.value.trim() || files[i].name;
      files[i].name = nouNom.endsWith('.py') ? nouNom : nouNom + '.py';
      renderTabs();
      planificaAutoguardat();
    }
    input.addEventListener('blur', confirma);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = files[i].name; input.blur(); }
    });
  }

  // ── Exportació / Importació ZIP ───────────────────────────────────────
  exportBtn.addEventListener('click', async () => {
    files[activeIdx].content = editor.state.doc.toString();
    const zip = new JSZip();
    for (const f of files) zip.file(f.name, f.content);
    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: nomProjecte + '.zip' });
    a.click();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener('click', () => importInput.click());

  importInput.addEventListener('change', async () => {
    const file = importInput.files[0];
    if (!file) return;
    importInput.value = '';
    try {
      const zip = await JSZip.loadAsync(file);
      const nousFitxers = [];
      for (const [nom, entrada] of Object.entries(zip.files)) {
        if (!entrada.dir && nom.endsWith('.py'))
          nousFitxers.push({ name: nom, content: await entrada.async('string') });
      }
      if (nousFitxers.length === 0) { alert('El ZIP no conté cap fitxer .py'); return; }
      files       = nousFitxers;
      activeIdx   = 0;
      nomProjecte = file.name.replace(/\.zip$/i, '');
      nomProjecteEl.textContent = nomProjecte;
      actualitzaTitol();
      editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: files[0].content } });
      renderTabs();
      desaEstat();
    } catch (e) { alert('Error important el ZIP: ' + e.message); }
  });

  esborraBtn.addEventListener('click', () => {
    if (!confirm('Segur? S\'esborraran tots els canvis no exportats i es tornarà als fitxers per defecte.')) return;
    localStorage.removeItem(CLAU_LS);
    files       = fitxersPerDefecte.map(f => ({ ...f }));
    activeIdx   = 0;
    nomProjecte = 'projecte';
    nomProjecteEl.textContent = nomProjecte;
    actualitzaTitol();
    editor.dispatch({ changes: { from: 0, to: editor.state.doc.length, insert: files[0].content } });
    renderTabs();
  });

  // ── Comptador de pols ─────────────────────────────────────────────────
  let pulse = 0;
  setInterval(() => { pulse++; pulseCounter.textContent = 'batec: ' + pulse; }, 150);

  // ── Consola: afegeix línia ────────────────────────────────────────────
  function logLine(text, cls) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = text;
    consoleOut.appendChild(div);
    consoleOut.scrollTop = consoleOut.scrollHeight;
    copyBtn.disabled = false;
  }

  // ── input() interactiu: mostra camp de text en línia ─────────────────
  let pendingInputEl = null;

  function mostraInputPrompt(prompt) {
    const wrapper = document.createElement('div');
    wrapper.className = 'stdin-line';

    const promptSpan = document.createElement('span');
    promptSpan.className = 'stdin-prompt';
    promptSpan.textContent = prompt;

    const inputEl = document.createElement('input');
    inputEl.type = 'text';
    inputEl.className = 'stdin-input';
    inputEl.setAttribute('autocomplete', 'off');
    inputEl.setAttribute('spellcheck', 'false');

    wrapper.appendChild(promptSpan);
    wrapper.appendChild(inputEl);
    consoleOut.appendChild(wrapper);
    consoleOut.scrollTop = consoleOut.scrollHeight;
    copyBtn.disabled = false;
    inputEl.focus();

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        inputEl.disabled = true;
        enviaInput(inputEl.value);
      }
    });

    return inputEl;
  }

  function enviaInput(value) {
    if (!ctrlArr || !sharedBuf) return;
    const bytes = new TextEncoder().encode(value);
    const maxLen = 4096;
    new Uint8Array(sharedBuf, 8).set(bytes.subarray(0, maxLen));
    ctrlArr[1] = Math.min(bytes.length, maxLen);
    Atomics.store(ctrlArr, 0, 1);   // Marca la resposta com a disponible
    Atomics.notify(ctrlArr, 0, 1);  // Desperta el worker
    pendingInputEl = null;
  }

  // ── Worker ────────────────────────────────────────────────────────────
  const workerSrc   = document.getElementById('worker-src').textContent;
  const blob        = new Blob([workerSrc], { type: 'text/javascript' });
  const blobURL     = URL.createObjectURL(blob);
  const pyodideBase = new URL('vendor/pyodide/0.28.3/', window.location.href).href;

  function creaWorker() {
    const w = new Worker(blobURL);
    w.onmessage = gestionaMissatge;
    w.postMessage({ type: 'init', pyodideBase, sharedBuffer: sharedBuf });
    return w;
  }

  function gestionaMissatge(event) {
    const msg = event.data;
    if (msg.type === 'ready') {
      statusDot.classList.remove('busy');
      statusDot.classList.add('ready');
      statusText.textContent = 'Python llest';
      runBtn.disabled = false;
      interruptBtn.disabled = true;
    } else if (msg.type === 'busy') {
      statusDot.classList.remove('ready');
      statusDot.classList.add('busy');
      statusText.textContent = 'Executant ' + files[activeIdx].name + '…';
      runBtn.disabled = true;
      interruptBtn.disabled = false;
    } else if (msg.type === 'done') {
      statusDot.classList.remove('busy');
      statusDot.classList.add('ready');
      statusText.textContent = 'Llest';
      runBtn.disabled = false;
      interruptBtn.disabled = true;
      pendingInputEl = null;
    } else if (msg.type === 'stdout') {
      logLine(msg.text, 'stdout');
    } else if (msg.type === 'stderr') {
      logLine(msg.text, 'stderr');
    } else if (msg.type === 'status') {
      statusText.textContent = msg.text;
    } else if (msg.type === 'requestInput') {
      pendingInputEl = mostraInputPrompt(msg.prompt);
    } else if (msg.type === 'image') {
      // Mostra la imatge PNG enviada per matplotlib.show() dins la consola
      const img = document.createElement('img');
      img.src = 'data:image/png;base64,' + msg.data;
      img.style.cssText = 'max-width:100%;margin-top:6px;border-radius:4px;display:block;';
      consoleOut.appendChild(img);
      consoleOut.scrollTop = consoleOut.scrollHeight;
      copyBtn.disabled = false;
    }
  }

  let worker = creaWorker();

  // ── Botó Executa ──────────────────────────────────────────────────────
  runBtn.addEventListener('click', () => {
    files[activeIdx].content = editor.state.doc.toString();
    consoleOut.innerHTML = '';
    copyBtn.disabled = true;
    logLine('--- executant ' + files[activeIdx].name + ' ---', 'status');

    const moduleNames = files.map(f => f.name.replace(/\.py$/, ''));
    worker.postMessage({
      type: 'run',
      files: files.map(f => ({ path: '/' + f.name, content: f.content })),
      moduleNames,
      code: files[activeIdx].content,
    });
  });

  // ── Botó Interromp ────────────────────────────────────────────────────
  interruptBtn.addEventListener('click', () => {
    worker.terminate();
    // Neteja el camp d'entrada pendent si el worker s'ha aturat esperant input
    if (pendingInputEl) {
      pendingInputEl.disabled = true;
      pendingInputEl = null;
    }
    interruptBtn.disabled = true;
    runBtn.disabled = true;
    statusDot.classList.remove('ready', 'busy');
    statusText.textContent = 'S\'està reiniciant l\'entorn…';
    logLine('--- execució interrompuda, reiniciant entorn… ---', 'status');
    worker = creaWorker();
  });

  // ── Botó Neteja ───────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    consoleOut.innerHTML = '';
    copyBtn.disabled = true;
  });

  // ── Botó Copia ────────────────────────────────────────────────────────
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(consoleOut.textContent).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = 'Copiat!';
      setTimeout(() => { copyBtn.textContent = original; }, 1500);
    });
  });

  // ── Renderitza les pestanyes inicials ─────────────────────────────────
  renderTabs();
})();
</script>

</body>
</html>

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    add_header Cross-Origin-Opener-Policy  "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    # Nou: permet que altres pàgines (p.ex. pahoSnap, amb COEP propi)
    # incrustin py.binefa.cat dins d'un <iframe>. Sense això, un COEP actiu
    # a la pàgina que ens incrusta bloqueja la càrrega del nostre document
    # ("blocked due to its Cross-Origin-Resource-Policy header (or lack
    # thereof)"). "cross-origin" és permissiu: només diu "qualsevol origen
    # em pot carregar", no restringeix res de nou.
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    location /vendor/ {
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
